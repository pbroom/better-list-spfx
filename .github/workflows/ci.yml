name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Forbid @spfx-kit dependencies
        run: |
          node -e "
            const pkg = require('./package.json');
            const deps = { ...pkg.dependencies, ...pkg.devDependencies };
            const bad = Object.keys(deps).filter((name) => name.startsWith('@spfx-kit/'));
            if (bad.length) {
              console.error('Production SPFx apps must not depend on @spfx-kit packages: ' + bad.join(', '));
              process.exit(1);
            }
          "

      - name: Install dependencies
        run: npm ci

      - name: Verify synchronized release versions
        run: npm run version:check

      - name: Test release artifact tooling
        run: npm run test:release

      - name: Build self-contained package and CDN template
        run: npm run release:build

      - name: Construct and verify release archives
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          source_date_epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          npm run release:prepare -- \
            --tag "v$version" \
            --commit "$GITHUB_SHA" \
            --source-date-epoch "$source_date_epoch" \
            --output-dir release-output
          npm run release:verify -- \
            --tag "v$version" \
            --commit "$GITHUB_SHA" \
            --output-dir release-output

      - name: Upload validated release archives
        uses: actions/upload-artifact@v4
        with:
          name: release-archives
          path: release-output/*.zip
          if-no-files-found: error
