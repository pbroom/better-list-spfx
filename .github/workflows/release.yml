name: Publish release artifacts

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing vX.Y.Z release tag to rebuild and republish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, validate, and attach artifacts
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Require main workflow definition for manual recovery
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Manual recovery must be dispatched from the main branch workflow." >&2
            exit 1
          fi

      - name: Check out immutable release tag
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Verify tag and main ancestry
        id: release-ref
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z: $RELEASE_TAG" >&2
            exit 1
          fi
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"
          git fetch --no-tags origin main
          release_sha="$(git rev-parse "$RELEASE_TAG^{commit}")"
          if ! git merge-base --is-ancestor "$release_sha" origin/main; then
            echo "$RELEASE_TAG ($release_sha) is not reachable from origin/main" >&2
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$release_sha" ]]; then
            echo "Checkout does not match the requested release tag" >&2
            exit 1
          fi
          actual_tag="$(gh release view "$RELEASE_TAG" --json tagName --jq '.tagName')"
          if [[ "$actual_tag" != "$RELEASE_TAG" ]]; then
            echo "GitHub Release tag does not match $RELEASE_TAG" >&2
            exit 1
          fi
          echo "sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "source_date_epoch=$(git show -s --format=%ct "$release_sha")" >> "$GITHUB_OUTPUT"

      - name: Set up supported Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies cleanly
        run: npm ci

      - name: Verify release versions
        run: npm run version:check

      - name: Run release tooling tests
        run: npm run test:release

      - name: Build self-contained package and CDN template
        run: npm run release:build

      - name: Construct release assets
        run: |
          npm run release:prepare -- \
            --tag "$RELEASE_TAG" \
            --commit "${{ steps.release-ref.outputs.sha }}" \
            --source-date-epoch "${{ steps.release-ref.outputs.source_date_epoch }}" \
            --output-dir release-output

      - name: Verify package modes and archive integrity
        run: |
          npm run release:verify -- \
            --tag "$RELEASE_TAG" \
            --commit "${{ steps.release-ref.outputs.sha }}" \
            --output-dir release-output

      - name: Preserve validated artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: better-list-${{ env.RELEASE_TAG }}
          path: release-output/*
          if-no-files-found: error
          retention-days: 30

      - name: Attach artifacts to matching GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release-output -maxdepth 1 -type f -print | sort)
          if [[ "${#assets[@]}" -ne 2 ]]; then
            echo "Expected exactly two validated release archives" >&2
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          for asset in "${assets[@]}"; do
            asset_name="$(basename "$asset")"
            local_digest="sha256:$(sha256sum "$asset" | cut -d' ' -f1)"
            remote_digest="$(
              gh api "repos/$GH_REPO/releases/tags/$RELEASE_TAG" \
                --jq ".assets[] | select(.name == \"$asset_name\") | .digest"
            )"
            if [[ -z "$remote_digest" || "$remote_digest" != "$local_digest" ]]; then
              echo "GitHub asset digest mismatch for $asset_name" >&2
              echo "local:  $local_digest" >&2
              echo "remote: ${remote_digest:-missing}" >&2
              exit 1
            fi
          done
